name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI (bb test + lint)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        bb: ['1.12.218']
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          bb: ${{ matrix.bb }}

      - name: clj-kondo
        run: |
          curl -sLO https://raw.githubusercontent.com/clj-kondo/clj-kondo/master/script/install-clj-kondo
          chmod +x install-clj-kondo
          ./install-clj-kondo --dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: bb test
        working-directory: cli
        run: bb test

      - name: bb lint
        working-directory: cli
        run: bb lint
        continue-on-error: true  # TODO: fix pre-existing clj-kondo warnings, then remove this
