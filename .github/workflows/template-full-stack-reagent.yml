name: template-full-stack-reagent

on:
  push:
    branches: [main]
    paths:
      - 'templates/full-stack-reagent/**'
      - 'cli/**'
      - '.github/workflows/template-full-stack-reagent.yml'
      - 'verification/**'
  pull_request:
    paths:
      - 'templates/full-stack-reagent/**'
      - 'cli/**'
      - '.github/workflows/template-full-stack-reagent.yml'
      - 'verification/**'
  workflow_dispatch:

jobs:
  template-at-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - name: clojure -M:test:spec inside template tree
        run: |
          cd templates/full-stack-reagent
          clojure -M:test:spec

  hook-iso-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          bb: 1.12.218
      - name: Run c3kit-template.bb isolation test
        run: |
          cd templates/full-stack-reagent
          bb spec/hook_test.bb

  verify-light:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        combo:
          - memory-minimal
          - memory-no-auth
          - memory-no-ssr-no-content
          - memory-no-websocket
          - sqlite-defaults
          - postgres-defaults
          - datomic-pro-defaults
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
          bb: 1.12.218
          clj-kondo: latest
          cljfmt: latest
      - name: Verify (light)
        run: |
          cd verification
          bb verify --combo ${{ matrix.combo }} --tier light \
            --cli-cp ${{ github.workspace }}/cli/src

  verify-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
          bb: 1.12.218
          clj-kondo: latest
          cljfmt: latest
      - name: Install Playwright browser
        run: npx --yes playwright install --with-deps chromium
      - name: Verify (full, memory-defaults)
        run: |
          cd verification
          bb verify --combo memory-defaults --tier full \
            --cli-cp ${{ github.workspace }}/cli/src
