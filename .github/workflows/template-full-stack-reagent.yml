name: template-full-stack-reagent

on:
  push:
    branches: [main]
    paths:
      - 'templates/full-stack-reagent/**'
      - 'cli/**'
      - '.github/workflows/template-full-stack-reagent.yml'
  pull_request:
    paths:
      - 'templates/full-stack-reagent/**'
      - 'cli/**'
      - '.github/workflows/template-full-stack-reagent.yml'
  workflow_dispatch:

jobs:
  template-at-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - name: clojure -M:test:spec inside template tree
        run: |
          cd templates/full-stack-reagent
          clojure -M:test:spec

  scaffold-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        combo:
          - memory-defaults
          - sqlite-defaults
          - postgres-defaults
          - datomic-pro-defaults
          - memory-minimal
          - memory-csp-on
          - memory-no-auth
          - memory-no-ssr-no-content
          - memory-no-websocket
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
          bb: 1.12.218
      - name: Run verify-scaffold for combo
        run: |
          cd templates/full-stack-reagent
          bb dev/verify-scaffold.bb \
            --combo ${{ matrix.combo }} \
            --cli-cp ${{ github.workspace }}/cli/src

  macos-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
          bb: 1.12.218
      - name: Single smoke combo on macOS
        run: |
          cd templates/full-stack-reagent
          bb dev/verify-scaffold.bb \
            --combo memory-defaults \
            --cli-cp ${{ github.workspace }}/cli/src
