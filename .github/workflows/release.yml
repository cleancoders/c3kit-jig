name: release

on:
  push:
    # `+` is one-or-more in GitHub's ref-filter syntax (not @actions/glob),
    # so this matches bare-semver tags like 1.0.0 / 1.10.99. `bb release`
    # pushes `git tag <VERSION>` where VERSION is the root VERSION file.
    tags: ['[0-9]+.[0-9]+.[0-9]+']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          bb: '1.12.218'

      - name: bb test
        working-directory: cli
        run: bb test

      - name: build uberscript
        working-directory: cli
        run: bb build

      - name: compute sha256
        working-directory: cli
        run: |
          sha256sum dist/c3kit-jig.bb | cut -d' ' -f1 > dist/c3kit-jig.bb.sha256
          ls -lah dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/dist/c3kit-jig.bb
            cli/dist/c3kit-jig.bb.sha256
